<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Limited</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Центральный блок */
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 40px;
            max-width: 600px;
        }

        /* Смайлик из палочек и точек */
        .face {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 1;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 20px 0;
            line-height: 1.2;
        }

        p {
            font-size: 16px;
            color: #757575;
            line-height: 1.5;
            margin: 0;
        }

        /* Футер (нижняя часть) */
        footer {
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 13px;
        }

        .powered-by {
            color: #9e9e9e;
        }

        .brand {
            font-weight: 900;
            font-size: 18px;
            color: #000;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .brand span {
            font-weight: 400;
        }

        .info {
            text-align: right;
            color: #757575;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="face">. :<br>—</div>
        
        <h1>Too many requests have been sent.<br>Access to the resource is limited</h1>
        
        <p>
            The session ID was lost during data delivery.<br>
            Contact the resource administrator.
        </p>
    </div>

    <footer>
        <div class="powered-by">
            Powered by<br>
            <div class="brand">CHECKPERSON<span>{}</span>N</div>
        </div>
        
        <div class="info">
            ID:00000000<br>
            ouptv.gma@proton.me<br>
            status.ouptv.ru
        </div>
    </footer>

</body>
</html>
