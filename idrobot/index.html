<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Limited</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 40px;
            max-width: 650px;
            margin: 0 auto;
        }
        .face {
            font-size: 60px;
            font-weight: bold;
            margin-bottom: 30px;
            line-height: 0.8;
            letter-spacing: -2px;
        }

        h1 {
            font-size: 28px;
            font-weight: 600;
            margin: 0 0 20px 0;
            line-height: 1.25;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 16px;
            color: #6e6e73;
            line-height: 1.5;
            margin: 0;
        }

        footer {
            padding: 40px 60px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            font-size: 13px;
        }

        .powered-by {
            color: #86868b;
        }
        .brand {
            font-weight: 800;
            font-size: 19px;
            color: #000;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-top: 4px;
        }

        .info {
            text-align: right;
            color: #6e6e73;
            line-height: 1.6;
        }

        #random-id {
            font-family: monospace;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="face">. :<br>—</div>
        
        <h1>Too many requests have been sent.<br>Access to the resource is limited.</h1>
        
        <p>
            We are sorry that you had to deal with this.<br>
            Try disabling the VPN, restarting the Router,<br> 
            or contacting your ISP for help.
        </p>
    </div>

    <footer>
        <div class="powered-by">
            Powered by<br>
            <div class="brand">CHECKPERS{}N</div>
        </div>
        
        <div class="info">
            ID:<span id="random-id"></span><br>
            ouptv.gma@proton.me<br>
            status.ouptv.ru
        </div>
    </footer>

    <script>
        function generateRandomId(length) {
            let result = '';
            for (let i = 0; i < length; i++) {
                result += Math.floor(Math.random() * 10);
            }
            return result;
        }

        document.getElementById('random-id').innerText = generateRandomId(16);
    </script>

</body>
</html>
