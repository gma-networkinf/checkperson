<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifying...</title>
    <style>
        /* Делаем экран полностью белым и убираем курсор для вида "зависшей" проверки */
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            cursor: wait;
        }
    </style>
</head>
<body>

    <script>
        // Ждем 4 секунды (4000 мс)
        setTimeout(function() {
            var path = window.location.pathname;
            var destination = "";

            // Логика распределения в зависимости от URL
            if (path.indexOf('/mob') !== -1) {
                destination = "https://m.ouptv.ru";
            } 
            else if (path.indexOf('/desktop') !== -1) {
                destination = "https://desktop.ouptv.ru";
            } 
            else {
                // Если зашли по любому другому адресу (например, /id или просто в корень)
                destination = "https://checkperson.ouptv.ru/idrobot";
            }

            // Выполняем переадресацию
            window.location.replace(destination);
        }, 4000);
    </script>

</body>
</html>
